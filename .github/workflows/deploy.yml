name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 1. Root dependencies ────────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      # ── 2. Generate Angular environment files from GitHub Secrets ───────────
      - name: Generate environment files
        env:
          FIREBASE_PROJECT_ID:        ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID:            ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_STORAGE_BUCKET:    ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_API_KEY:           ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:       ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        run: node scripts/set-env.js

      # ── 3. Build Angular app ─────────────────────────────────────────────────
      - name: Build Angular (production)
        run: npm run build -- --configuration production

      # ── 4. Cloud Functions: deps + secret env ────────────────────────────────
      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Write Functions env secret
        run: echo "GOOGLE_GENAI_API_KEY=${{ secrets.GOOGLE_GENAI_API_KEY }}" > functions/.env

      # ── 5. Deploy Firestore rules & indexes (IaC) ───────────────────────────
      - name: Deploy Firestore rules & indexes
        run: npx firebase-tools deploy --only firestore --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── 6. Deploy Cloud Functions ────────────────────────────────────────────
      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── 7. Deploy Firebase Hosting ───────────────────────────────────────────
      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── 8. Seed Firestore agent configs ──────────────────────────────────────
      - name: Seed Firestore agent configs
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
        run: node scripts/seed-firestore.js
